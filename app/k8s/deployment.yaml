apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-demo

  template:
    metadata:
      labels:
        app: flask-demo

    spec:
      containers:
      - name: flask-demo
        image: flask-demo:v1
        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5

        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
